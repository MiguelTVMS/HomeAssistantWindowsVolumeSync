name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Extract version from tag
        id: get_version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Restore dependencies
        run: dotnet restore HomeAssistantWindowsVolumeSync.sln

      - name: Build and Test
        run: |
          dotnet build HomeAssistantWindowsVolumeSync.sln --configuration Release --no-restore
          dotnet test HomeAssistantWindowsVolumeSync.sln --configuration Release --no-build --verbosity normal

      - name: Publish self-contained
        run: dotnet publish src/HomeAssistantWindowsVolumeSync.csproj -c Release -r win-x64 --self-contained true -o publish/self-contained /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish framework-dependent
        run: dotnet publish src/HomeAssistantWindowsVolumeSync.csproj -c Release -r win-x64 --self-contained false -o publish/framework-dependent

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          # Inno Setup is pre-installed on windows-latest at this path
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            # Fallback: install via Chocolatey if not present
            choco install innosetup --no-progress -y
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          New-Item -ItemType Directory -Force -Path installer-output | Out-Null
          & $iscc "/DAppVersion=${{ steps.get_version.outputs.VERSION }}" "installer\windows.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed (exit $LASTEXITCODE)" }

      - name: Create zip artifacts
        shell: pwsh
        run: |
          # Self-contained zip
          Compress-Archive -Path publish/self-contained/* -DestinationPath HomeAssistantWindowsVolumeSync-${{ steps.get_version.outputs.VERSION }}-win-x64-self-contained.zip

          # Framework-dependent zip
          Compress-Archive -Path publish/framework-dependent/* -DestinationPath HomeAssistantWindowsVolumeSync-${{ steps.get_version.outputs.VERSION }}-win-x64.zip

      - name: Create Draft Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            installer-output/HomeAssistantWindowsVolumeSync-${{ steps.get_version.outputs.VERSION }}-win-x64-install.exe
            HomeAssistantWindowsVolumeSync-${{ steps.get_version.outputs.VERSION }}-win-x64-self-contained.zip
            HomeAssistantWindowsVolumeSync-${{ steps.get_version.outputs.VERSION }}-win-x64.zip
          body: |
            ## Installation

            ### Recommended: Installer
            Download `HomeAssistantWindowsVolumeSync-${{ steps.get_version.outputs.VERSION }}-win-x64-install.exe` and run it. No admin rights required — installs to your user profile.

            ### Portable (zip)
            - **self-contained**: Includes .NET runtime, no prerequisites needed (~70MB)
            - **win-x64**: Requires [.NET 8 Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) installed (~10MB)

            Extract and run `HomeAssistantWindowsVolumeSync.exe`. Right-click the system tray icon → Settings to configure.

            ## What's Changed

            See the full changelog below.

      - name: Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.create_release.outputs.id }},
              draft: false
            });
